input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse timestamp
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Add tags based on log level
  if [level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  } else if [level] == "WARN" {
    mutate {
      add_tag => [ "warning" ]
    }
  }

  # Extract user ID if present
  if [trace][userId] {
    mutate {
      add_field => { "user_id" => "%{[trace][userId]}" }
    }
  }

  # Extract trace ID if present
  if [trace][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[trace][traceId]}" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "iced-latte-%{+YYYY.MM.dd}"
  }

  # Debug output (optional, comment out in production)
  stdout {
    codec => rubydebug
  }
}
