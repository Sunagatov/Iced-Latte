#
# Server Properties
#
server:
  port: ${PORT:${APP_SERVER_PORT}}
  tomcat:
    accept-count: 20
    threads:
      max: 50
      min-spare: 5
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
    whitelabel:
      enabled: false
    # dev profile overrides these to always

#
# Spring Properties
#
spring:
  application:
    name: Iced Latte Application
    version: ${APP_VERSION:1}
    label: iced-latte-application
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: false
    lazy-initialization: true
  threads:
    virtual:
      enabled: true
  banner:
    charset: UTF-8
    location: classpath:banner.txt
  output:
    ansi:
      enabled: never

  #
  # Database Properties
  #
  datasource:
    url: jdbc:postgresql://${DATASOURCE_HOST}:${DATASOURCE_PORT}/${DATASOURCE_NAME}?serverTimezone=UTC&sslmode=${DATASOURCE_SSL_MODE:disable}&prepareThreshold=0
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 20000
      idle-timeout: 0            # pool never shrinks (minimum-idle=1), disable idle eviction
      max-lifetime: 240000   # 4 min — must be < DB/proxy idle timeout (typically 5 min)
      keepalive-time: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        allow_jdbc_metadata_access: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.yaml

  #
  # AWS Properties
  #
  aws:
    enabled: ${AWS_ENABLED:false}
    account-id: ${AWS_ACCOUNT_ID:}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    endpoint-url: ${AWS_ENDPOINT_URL:}
    public-url-base: ${AWS_PUBLIC_URL_BASE:}
    cloudfront-distribution-id: ${AWS_CLOUDFRONT_DISTRIBUTION_ID:}
    buckets:
      products: ${AWS_PRODUCT_BUCKET}
      user-avatar: ${AWS_USER_BUCKET}
    link-expiration-time: PT1H
    read-timeout: 10s
    connect-timeout: 10s
    write-timeout: 60s
    secure: true
    default-image-directory:
      products: ${AWS_DEFAULT_PRODUCT_IMAGES_PATH}

  #
  # Redis Properties
  #
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  #
  # Email Properties
  #
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    subject:
      confirmation: "Iced Latte - Email Confirmation"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  messages:
    basename: messages/messages

  config:
    import: optional:stripe.yaml

  # Avatar Upload Properties
  #
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 2KB

#
# Pagination Properties
#
pagination:
  default-page-number: 0
  products:
    default-page-size: 50
    default-sort-attribute: "name"
    default-sort-direction: "desc"
  reviews:
    default-page-size: 10
    default-sort-attribute: "createdAt"
    default-sort-direction: "desc"

#
# Cache Properties
#
cache:
  default-ttl: PT10M
  product-ttl: PT10M
  brands-ttl: PT24H
  sellers-ttl: PT24H
  image-url-ttl: PT50M
  image-urls-ttl: PT24H
  caffeine:
    rate-limit-warn-size: 1000
    rate-limit-filter-size: 5000
    rate-limit-window-size: 10000
    redis-error-log-size: 1000
    temporary-store-size: 10000

#
# Temporary Cache
#
temporary-cache:
  time:
    token: 5
  get-token-enabled: true

#
# Product Properties
#
product:
  placeholder-image-url: "/assets/images/product-placeholder.png"

#
# Migration Properties
#
migration:
  timeout-minutes: 5

#
# Feature Flags
# Set to true only when you have real credentials for that service.
#
google:
  enabled: ${GOOGLE_ENABLED:false}
  auth:
    server:
      url: ${GOOGLE_AUTH_SERVER_URL}
  scope: ${GOOGLE_AUTH_SCOPE}
  client-id: ${GOOGLE_AUTH_CLIENT_ID:local}
  client-secret: ${GOOGLE_AUTH_CLIENT_SECRET:local}
  redirect-uri: ${GOOGLE_AUTH_REDIRECT_URI}

ai:
  enabled: ${AI_ENABLED:false}
  api-key: ${SPRING_AI_OPENAI_API_KEY:local}
  base-url: ${AI_BASE_URL}
  model-name: ${AI_MODEL_NAME}
  review-summary:
    debounce-delay: PT2M
    max-wait: PT10M

email:
  enabled: ${EMAIL_ENABLED:false}
  verification-token-length: 9

stripe:
  enabled: ${STRIPE_ENABLED:false}
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  currency: ${STRIPE_CURRENCY:usd}
  shipping-options:
    - name: "Free shipping"
      amount-cents: 0
      min-days: 5
      max-days: 7
    - name: "Next day air"
      amount-cents: 1500
      min-days: 1
      max-days: 1

#
# Frontend Properties
#
frontend:
  url: ${FRONTEND_URL}

problem:
  type-base-url: ${PROBLEM_TYPE_BASE_URL}

#
# Spring Doc Properties
#
springdoc:
  api-docs:
    path: /api/docs/schema
    enabled: true
  swagger-ui:
    path: /api/docs/swagger-ui
    enabled: true
  pre-loading-enabled: false
  default-produces-media-type: application/json

#
# Observability Properties
#
sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  
  # Error Sampling - capture all errors in production
  sample-rate: 1.0
  
  # Performance Monitoring - trace 10% of transactions
  traces-sample-rate: 0.1
  
  # Profiling - profile 10% of traced transactions
  profiles-sample-rate: 0.1
  
  # Privacy & Security
  send-default-pii: false
  attach-stacktrace: true
  attach-threads: true
  
  # Performance Monitoring
  enable-tracing: true
  enable-profiling: true
  
  # Logging Integration
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
  
  # Performance Thresholds (in milliseconds)
  tracing:
    origins:
      - ".*"
  
  # Ignore specific exceptions (optional)
  ignored-exceptions-for-type:
    - java.lang.IllegalArgumentException
  
  # In-App Packages (auto-configured by Spring Boot)
  in-app-packages:
    - com.zufar.icedlatte

#
# Management Properties
#
management:
  server:
    port: ${server.port}
  endpoint:
    prometheus:
      enabled: true
    shutdown:
      enabled: false
    health:
      enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
        # metrics and prometheus are internal; restrict to authorized access only via show-details: when-authorized
      base-path: /actuator
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.data.repository.invocations: true
        hikaricp.connections.acquire: true
        lettuce.command.completion: true
      slo:
        http.server.requests: 50ms,100ms,250ms,500ms,1s,2s,5s
      percentiles:
        http.server.requests: 0.5,0.95,0.99
  health:
    redis:
      enabled: true
  tracing:
    sampling:
      probability: 0.1
  observations:
    key-values:
      application: ${spring.application.name}

#
# JWT Security Properties
#
jwt:
  header: Authorization
  secret: ${APP_JWT_SECRET}
  expiration: PT15M # 15 minutes
  refresh-secret: ${APP_JWT_REFRESH_SECRET}
  refresh-expiration: PT24H # 1 day
  issuer: ${APP_JWT_ISSUER:iced-latte}
  audience: ${APP_JWT_AUDIENCE:iced-latte-client}

#
# CORS Properties
#
cors:
  allowed-origins: ${ALLOWED_ORIGINS}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  exposed-headers: Authorization,Content-Type,X-Request-ID
  allow-credentials: true
  max-age: 3600

#
# Rate Limiting Properties
#
security:
  rate-limit:
    global:
      max-requests: 60
      window-duration: PT1M
    auth:
      max-requests: 10
      window-duration: PT1M
    search:
      max-requests: 30
      window-duration: PT1M
    telemetry:
      max-requests: 120
      window-duration: PT1M
    pre-auth:
      max-requests: 200
      window-duration: PT1M
    payment:
      # Stripe session creation + webhook: tighter than global to limit abuse surface.
      # Webhook endpoint is permitAll (Stripe calls it server-side) so pre-auth limiter
      # is the only guard when stripe.enabled=false or the JWT is absent.
      max-requests: 20
      window-duration: PT1M
  # Comma-separated list of trusted reverse-proxy IPs that may set X-Forwarded-For.
  # Leave empty when the app is directly reachable (safe default).
  trusted-proxies:
  # NOTE: /actuator/health, /actuator/info, /actuator/prometheus are permitAll and skipped
  # by both rate-limiting filters. They MUST be protected at the network/reverse-proxy layer
  # (e.g. restrict /actuator/prometheus to the Prometheus scraper IP). Do not expose them
  # to the public internet without that protection.

oauth:
  state-ttl-minutes: 10

#
# Login Attempts Properties
#
login-attempts:
  max-attempts: 5
  lockout-duration-minutes: 60

unlock-account-scheduler-cron: '0 0/5 * * * *' # every 5 minutes

#
# Monitoring Properties
#
monitoring:
  slow-query-threshold-ms: 200

#
# Logging Properties
#
logging:
  pattern:
    file: iced-latte-backend-%d{yyyy-MM-dd}.%i.log
  config: ${LOGGING_CONFIG:classpath:logback-spring.xml}
  level:
    http.access: ${HTTP_ACCESS_LOG_LEVEL:INFO}
    io.opentelemetry.exporter: WARN
  
  # Grafana Loki Configuration
  loki:
    enabled: ${LOKI_ENABLED:false}
    url: ${LOKI_URL:}
  
  # Elasticsearch/Logstash Configuration
  logstash:
    enabled: ${LOGSTASH_ENABLED:false}
    host: ${LOGSTASH_HOST:}
    port: ${LOGSTASH_PORT:}
  
  # Datadog Configuration
  datadog:
    enabled: ${DATADOG_ENABLED:false}

  # Access log slow-request threshold (ms). Requests at or above this value are logged at WARN.
  # Override per environment: logging.slow-request-threshold-ms=500
  slow-request-threshold-ms: ${LOGGING_SLOW_REQUEST_THRESHOLD_MS:500}
