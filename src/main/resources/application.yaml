
#
# Server Properties
#
server:
  port: ${PORT:${APP_SERVER_PORT}}
  tomcat:
    accept-count: 100
    max-http-form-post-size: 2MB
    max-swallow-size: 2MB
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false
    whitelabel:
      enabled: false
    # dev profile overrides these to always

#
# Spring Properties
#
spring:
  application:
    name: Iced Latte Application
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: false
    lazy-initialization: true
  threads:
    virtual:
      enabled: true
  banner:
    charset: UTF-8
    location: classpath:banner.txt
  output:
    ansi:
      enabled: never
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY}
      prompt: "You are an assistant who checks texts for appropriateness.
            Analyze the following text {review} and determine if it contains political statements,
            non-English language, or inappropriate language.
            If you find any of these issues, return the phrase 'not appropriate', after return the reason in curly brackets. 
            Only the reason should be in curly brackets.
            Else return OK"
      chat:
        options:
          model: gpt-3.5-turbo

  #
  # Database Properties
  #
  datasource:
    url: jdbc:postgresql://${DATASOURCE_HOST}:${DATASOURCE_PORT}/${DATASOURCE_NAME}?serverTimezone=UTC&sslmode=require
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        allow_jdbc_metadata_access: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.yaml
    drop-first: true

  #
  # AWS Properties
  #
  aws:
    enabled: ${AWS_ENABLED:true}
    account-id: ${AWS_ACCOUNT_ID:}
    access-key: ${AWS_ACCESS_KEY}
    secret-key: ${AWS_SECRET_KEY}
    region: ${AWS_REGION}
    endpoint-url: ${AWS_ENDPOINT_URL:}
    public-url-base: ${AWS_PUBLIC_URL_BASE:}
    buckets:
      products: ${AWS_PRODUCT_BUCKET}
      user-avatar: ${AWS_USER_BUCKET}
    link-expiration-time: PT1H
    read-timeout: 10s
    connect-timeout: 10s
    write-timeout: 60s
    secure: true
    default-image-directory:
      products: ${AWS_DEFAULT_PRODUCT_IMAGES_PATH}

  #
  # Redis Properties (DISABLED - using HashMap cache)
  #
  # data:
  #   redis:
  #     host: ${REDIS_HOST}
  #     port: ${REDIS_PORT}

  #
  # Email Properties
  #
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    subject:
      confirmation: "Iced Latte - Email Confirmation"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  messages:
    basename: messages/messages

  # Avatar Upload Properties
  #
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
      file-size-threshold: 2KB

#
# Pagination Properties
#
pagination:
  default-page-number: 0
  products:
    default-page-size: 50
    default-sort-attribute: "name"
    default-sort-direction: "desc"
  reviews:
    default-page-size: 10
    default-sort-attribute: "createdAt"
    default-sort-direction: "desc"

#
# Cache Properties
#
cache:
  default-ttl: PT10M
  product-ttl: PT10M
  brands-ttl: PT24H
  sellers-ttl: PT24H

#
# Temporary Cache
#
temporary-cache:
  time:
    token: 1
  get-token-enabled: true

  #
#
springdoc:
  api-docs:
    path: /api/docs/schema
    enabled: true
  swagger-ui:
    path: /api/docs/swagger-ui
    enabled: true
  pre-loading-enabled: false
  default-produces-media-type: application/json

#
# Management Properties
#
management:
  server:
    port: ${server.port}
  endpoint:
    prometheus:
      enabled: true
    shutdown:
      enabled: false
    health:
      enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
        # metrics and prometheus are internal; restrict to authorized access only via show-details: when-authorized
      base-path: /actuator
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    redis:
      enabled: false
  tracing:
    sampling:
      probability: 0.1
    # dev profile overrides to 1.0

#
# OpenTelemetry Properties
#
management.otlp:
  tracing:
    endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    export:
      url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics

#
# JWT Security Properties
#
jwt:
  header: Authorization
  secret: ${APP_JWT_SECRET}
  expiration: PT24H # 1 day
  refresh-secret: ${APP_JWT_REFRESH_SECRET}
  refresh-expiration: PT24H # 1 day
  issuer: ${APP_JWT_ISSUER:iced-latte}
  audience: ${APP_JWT_AUDIENCE:iced-latte-client}

#
# CORS Properties
#
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  exposed-headers: Authorization,Content-Type,X-Request-ID
  allow-credentials: true
  max-age: 3600

#
# Rate Limiting Properties
#
security:
  rate-limit:
    global:
      max-requests: 60
      window-duration: PT1M
    auth:
      max-requests: 10
      window-duration: PT1M
    ai:
      max-requests: 5
      window-duration: PT1M
    search:
      max-requests: 30
      window-duration: PT1M

#
# Login Attempts Properties
#
login-attempts:
  max-attempts: 5
  lockout-duration-minutes: 60

unlock-account-scheduler-cron: '0 0/5 * * * *' # every 5 minutes

#
# Monitoring Properties
#
monitoring:
  slow-query-threshold-ms: 200

#
# Logging Properties
#
logging:
  pattern:
    file: iced-latte-backend-%d{yyyy-MM-dd}.%i.log
  config: classpath:logback-spring.xml

#
# AI Properties
#
ai:
  # https://platform.openai.com/docs/api-reference/moderations/create
  url: "https://api.openai.com/v1/moderations"
  api-key: ${SPRING_AI_OPENAI_API_KEY:}
  request-body: '{"input": "$message"}'
  message-replacement-pattern: "$message"

#
# Google Auth Properties
#
google:
  auth:
    server:
      url: "https://accounts.google.com/o/oauth2/v2/auth"
  scope: "openid https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email"
  client-id: ${GOOGLE_AUTH_CLIENT_ID}
  client-secret: ${GOOGLE_AUTH_CLIENT_SECRET}
  redirect-uri: ${GOOGLE_AUTH_REDIRECT_URI}
