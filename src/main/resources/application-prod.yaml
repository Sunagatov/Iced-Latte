server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  output:
    ansi:
      enabled: never
  liquibase:
    drop-first: false

# Production Sentry Configuration
sentry:
  # Capture all errors in production
  sample-rate: 1.0
  # For low-traffic open-source project, trace all transactions
  traces-sample-rate: 1.0
  # Profile a subset of traced transactions
  profiles-sample-rate: 0.25

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      headers:
        Authorization: ${OTEL_EXPORTER_OTLP_AUTHORIZATION:${GRAFANA_CLOUD_OTLP_AUTHORIZATION:}}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false