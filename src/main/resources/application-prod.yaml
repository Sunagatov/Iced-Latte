server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  output:
    ansi:
      enabled: never
  liquibase:
    drop-first: false

# Production Sentry Configuration
sentry:
  # Capture all errors in production
  sample-rate: 1.0
  # Trace 5% of transactions to reduce overhead
  traces-sample-rate: 0.05
  # Profile 5% of traced transactions
  profiles-sample-rate: 0.05

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 0.05
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces
      headers:
        dd-api-key: ${DD_API_KEY}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
