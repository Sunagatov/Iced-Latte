server:
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  output:
    ansi:
      enabled: never
  liquibase:
    drop-first: false

# Production Sentry Configuration
sentry:
  # Capture all errors in production
  sample-rate: 1.0
  # For low-traffic open-source project, trace all transactions
  traces-sample-rate: 1.0
  # Profile a subset of traced transactions
  profiles-sample-rate: 0.25

management:
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  # Spring Boot 4.x OTel properties — routes all signals through local OTel Collector
  opentelemetry:
    resource-attributes:
      service.name: ${OTEL_SERVICE_NAME:iced-latte-backend}
      service.namespace: ${OTEL_SERVICE_NAMESPACE:iced-latte}
      service.version: ${OTEL_SERVICE_VERSION:latest}
      deployment.environment: ${OTEL_DEPLOYMENT_ENVIRONMENT:production}
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_COLLECTOR_BASE_URL:http://localhost:4318}/v1/traces
          transport: http
    logging:
      export:
        otlp:
          endpoint: ${OTEL_COLLECTOR_BASE_URL:http://localhost:4318}/v1/logs
          transport: http
  otlp:
    metrics:
      export:
        url: ${OTEL_COLLECTOR_BASE_URL:http://localhost:4318}/v1/metrics
        step: 1m

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    http.access: ${HTTP_ACCESS_LOG_LEVEL:WARN}

# Pyroscope continuous profiling
pyroscope:
  application-name: iced-latte-backend
  server-address: ${PYROSCOPE_SERVER_ADDRESS:}
  basic-auth-user: ${PYROSCOPE_BASIC_AUTH_USER:}
  basic-auth-password: ${PYROSCOPE_BASIC_AUTH_PASSWORD:}
  profiling-interval: 10ms
  upload-interval: 15s
  labels:
    environment: production
    region: eu-west-2
