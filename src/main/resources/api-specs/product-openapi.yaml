openapi: "3.0.3"

info:
  title: "Iced-Latte Product API"
  description: "API for interacting with Iced Latte's product catalog, including retrieving and listing products. Supports filtering, sorting, and pagination of product data."
  version: "1.0.0"
  contact:
    name: "Iced Latte Support"
    email: "zufar.sunagatov@gmail.com"
    url: "https://github.com/Sunagatov/Iced-Latte"
  license:
    name: "MIT"
    url: "https://github.com/Sunagatov/Iced-Latte/blob/main/LICENSE"

servers:
  - url: "http://localhost:8083"
    description: "Local development server"
  - url: "https://iced-latte.uk/backend"
    description: "Production server"

tags:
  - name: "Product"
    description: "API endpoints related to product management and retrieval."

paths:
  /api/v1/products/{productId}:
    get:
      tags:
        - "Product"
      summary: "Retrieve a product by its unique ID"
      description: "Fetch detailed information of a product using its unique identifier."
      operationId: "getProductById"
      parameters:
        - name: "productId"
          in: "path"
          required: true
          description: "Unique identifier of the product."
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Product details successfully retrieved."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductInfoDto"
        "400":
          description: "Invalid UUID format for productId."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
        "404":
          description: "Product not found for the given ID."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

  /api/v1/products/sellers:
    get:
      tags:
        - "Product"
      summary: "List all product sellers"
      description: "Retrieve a list of all distinct sellers from the database."
      operationId: "getAllSellers"
      responses:
        "200":
          description: "List of all product sellers retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellersDto"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

  /api/v1/products/brands:
    get:
      tags:
        - "Product"
      summary: "List all product brands"
      description: "Retrieve a list of all distinct brands from the database."
      operationId: "getAllBrands"
      responses:
        "200":
          description: "List of all product brands retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandsDto"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

  /api/v1/products:
    get:
      tags:
        - "Product"
      summary: "List products with pagination, sorting, and filtering"
      description: "Retrieve a paginated list of products with optional sorting and filtering parameters."
      operationId: "getProducts"
      parameters:
        - name: "page"
          description: "The page number (starting from 0) for pagination. Possible allowed values: 1) page=0 or 2) page=1 or 3) any other non negative value."
          in: "query"
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 0
          examples:
            example1:
              description: "Retrieve the first page of product's list."
              value: "page=0"
            example2:
              description: "Retrieve the second page of product's list."
              value: "page=1"
        - name: "size"
          description: "The number of products per page. Possible allowed values: 1) size=3 or 2) size=15 or 3) any other non negative value."
          in: "query"
          required: false
          schema:
            type: "integer"
            format: "int32"
            default: 50
          examples:
            example1:
              description: "Display only 3 products per page in the product list."
              value: "size=3"
            example2:
              description: "Display only 15 products per page in the product list."
              value: "size=15"
        - name: "sortAttribute"
          description: "The field name of the product by which the results should be sorted. Possible allowed values: 1) sortAttribute=name or 2) sortAttribute=price or 3) sortAttribute=quantity or 4) sortAttribute=averageRating or 5) sortAttribute=reviewsCount."
          in: "query"
          required: false
          schema:
            type: "string"
            default: "name"
          examples:
            example1:
              description: "Display the product list sorted by the provided sort attribute 'name' (the product's name)."
              value: "sortAttribute=name"
            example2:
              description: "Display the product list sorted by the provided sort attribute 'price' (the product's price)."
              value: "sortAttribute=price"
            example3:
              description: "Display the product list sorted by the provided sort attribute 'quantity' (the product's quantity)."
              value: "sortAttribute=quantity"
            example4:
              description: "Display the product list sorted by the provided sort attribute 'averageRating' (the product's averageRating)."
              value: "sortAttribute=averageRating"
            example5:
              description: "Display the product list sorted by the provided sort attribute 'reviewsCount' (the product's reviewsCount)."
              value: "sortAttribute=reviewsCount"
        - name: "sortDirection"
          description: "The direction of sorting. Possible allowed values: 1) sortDirection=asc or 2) sortDirection=desc."
          in: "query"
          required: false
          schema:
            type: "string"
            enum: ["asc", "desc"]
            default: "asc"
          examples:
            example1:
              description: "Display the product list in ascending order."
              value: "sortDirection=asc"
            example2:
              description: "Display the product list in descending order."
              value: "sortDirection=desc"
        - name: "minPrice"
          description: "Filter products by the lower limit of the product's price. Possible allowed values: 1) minPrice=5 or 2) minPrice=17.25 or 3) any other non negative integer or decimal number value."
          in: "query"
          required: false
          schema:
            type: "number"
            format: "decimal"
          examples:
            example1:
              description: "Display the product list filtered by the lower limit of the product's price (minPrice=5)."
              value: "minPrice=5"
            example2:
              description: "Display the product list filtered by the lower limit of the product's price (minPrice=17.25)."
              value: "minPrice=17.25"
        - name: "maxPrice"
          description: "Filter products by the upper limit of the product's price. Possible allowed values: 1) maxPrice=5 or 2) maxPrice=17.25 or 3) any other non negative integer or decimal number value."
          in: "query"
          required: false
          schema:
            type: "number"
            format: "decimal"
          examples:
            example1:
              description: "Display the product list filtered by the upper limit of the product's price (maxPrice=5)."
              value: "maxPrice=5"
            example2:
              description: "Display the product list filtered by the upper limit of the product's price (maxPrice=17.25)."
              value: "maxPrice=17.25"
        - name: "minimumAverageRating"
          description: "Filter products by the minimum average rating. Possible allowed values: 1) minimumAverageRating=1 or 2) minimumAverageRating=2 or 3) minimumAverageRating=3 or 4) minimumAverageRating=4"
          in: "query"
          required: false
          schema:
            type: "integer"
            format: "int32"
          examples:
            example1:
              description: "Display the product list filtered by the minimum average rating of a product (minimumAverageRating=1)."
              value: "minimumAverageRating=1"
            example2:
              description: "Display the product list filtered by the minimum average rating of a product (minimumAverageRating=2)."
              value: "minimumAverageRating=2"
            example3:
              description: "Display the product list filtered by the minimum average rating of a product (minimumAverageRating=3)."
              value: "minimumAverageRating=3"
            example4:
              description: "Display the product list filtered by the minimum average rating of a product (minimumAverageRating=4)."
              value: "minimumAverageRating=4"
        - name: "brandNames"
          description: "Filter products by selected brand names (comma-separated list). Possible allowed values: 1) brandNames=Starbucks or 2) brandNames=Starbucks,Folgers or 3) any other comma-separated list"
          in: "query"
          required: false
          schema:
            type: "array"
            items:
              type: "string"
          examples:
            example1:
              description: "Display the product list filtered by selected brand names (brandNames=Starbucks,Folgers)."
              value: "brandNames=Starbucks,Folgers"
            example2:
              description: "Display the product list filtered by selected brand names (brandNames=Starbucks)."
              value: "brandNames=Starbucks"
        - name: "sellerNames"
          description: "Filter products by selected seller names (comma-separated list). Possible allowed values: 1) sellerNames=BeanBrewers,JavaBeanCoffee,MorningMug or 2) sellerNames=BeanBrewers or 3) any other comma-separated list"
          in: "query"
          required: false
          schema:
            type: "array"
            items:
              type: "string"
          examples:
            example1:
              description: "Display the product list filtered by selected seller names (sellerNames=BeanBrewers,JavaBeanCoffee,MorningMug)."
              value: "sellerNames=BeanBrewers,JavaBeanCoffee,MorningMug"
            example2:
              description: "Display the product list filtered by selected seller names (sellerNames=BeanBrewers)."
              value: "sellerNames=BeanBrewers"
      responses:
        "200":
          description: "Paginated list of products retrieved successfully."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListWithPaginationInfoDto"
        "400":
          description: "Invalid parameters provided."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

  /api/v1/products/ids:
    post:
      tags:
        - "Product"
      summary: "Retrieve products by their IDs"
      description: "Fetch a list of products based on a list of unique identifiers."
      operationId: "getProductsByIds"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductIdsDto"
      responses:
        "200":
          description: "List of products retrieved successfully."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/ProductInfoDto"
        "400":
          description: "Invalid parameters provided."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

components:
  schemas:
    ProductInfoDto:
      type: "object"
      required:
        - id
        - name
        - description
        - price
        - quantity
        - active
        - averageRating
        - reviewsCount
        - brandName
        - sellerName
        - originCountry
        - weight
        - lengthSize
        - widthSize
        - heightSize
        - soldProductsCount
        - discount
        - dateAdded
        - popularityScore
      properties:
        id:
          type: "string"
          format: "uuid"
          description: "Unique identifier for the product."
        name:
          type: "string"
          description: "Name of the product."
        description:
          type: "string"
          description: "Description of the product."
        price:
          type: "number"
          format: "decimal"
          description: "Price of the product."
        quantity:
          type: "integer"
          format: "int32"
          description: "Available quantity of the product."
        active:
          type: "boolean"
          description: "Indicates if the product is active."
        productFileUrl:
          type: "string"
          description: "URL of the product's image or file."
        averageRating:
          type: "number"
          format: "decimal"
          description: "Average rating of the product."
        reviewsCount:
          type: "integer"
          format: "int32"
          description: "Number of reviews for the product."
        brandName:
          type: "string"
          description: "Brand of the product."
        sellerName:
          type: "string"
          description: "Seller of the product."
        originCountry:
          type: "string"
          description: "Country where the product is manufactured."
        weight:
          type: "integer"
          format: "int32"
          description: "Weight of the product."
        lengthSize:
          type: "integer"
          format: "int32"
          description: "Length size of the product."
        widthSize:
          type: "integer"
          format: "int32"
          description: "Width size of the product."
        heightSize:
          type: "integer"
          format: "int32"
          description: "Height size of the product."
        soldProductsCount:
          type: "integer"
          format: "int32"
          description: "Number of products sold."
        discount:
          type: "integer"
          format: "int32"
          description: "Discount applied to the product."
        dateAdded:
          type: "string"
          format: "date-time"
          description: "Date and time when the product was added."
        popularityScore:
          type: "integer"
          format: "int32"
          description: "Popularity score of the product."

    ProductListWithPaginationInfoDto:
      type: "object"
      required:
        - products
        - page
        - size
        - totalElements
        - totalPages
      properties:
        products:
          type: "array"
          items:
            $ref: "#/components/schemas/ProductInfoDto"
          description: "List of products."
        page:
          type: "integer"
          format: "int32"
          description: "Current page number."
        size:
          type: "integer"
          format: "int32"
          description: "Number of products per page."
        totalElements:
          type: "integer"
          format: "int64"
          description: "Total number of products."
        totalPages:
          type: "integer"
          format: "int32"
          description: "Total number of pages."

    ProductIdsDto:
      type: "object"
      required:
        - productIds
      properties:
        productIds:
          type: "array"
          items:
            type: "string"
            format: "uuid"
          description: "List of product IDs."

    SellersDto:
      type: "object"
      required:
        - sellers
      properties:
        sellers:
          type: "array"
          items:
            type: "string"
          description: "List of product sellers."

    BrandsDto:
      type: "object"
      required:
        - brands
      properties:
        brands:
          type: "array"
          items:
            type: "string"
          description: "List of product brands."


