openapi: "3.0.3"

info:
  title: "Iced Latte Common Schemas"
  description: "Shared schemas used across all Iced Latte APIs"
  version: "1.0.0"

paths: {}

components:
  schemas:
    ErrorResponse:
      type: "object"
      description: "RFC 9457 Problem Details error response"
      required:
        - type
        - title
        - status
      properties:
        type:
          type: "string"
          format: "uri"
          description: "Stable URI identifying the error type"
          example: "https://iced-latte.uk/errors/cart-not-found"
        title:
          type: "string"
          description: "Short human-readable label"
          example: "Shopping cart not found"
        status:
          type: "integer"
          description: "HTTP status code"
          minimum: 100
          maximum: 599
          example: 404
        detail:
          type: "string"
          description: "Human-readable diagnostic text"
          example: "Shopping cart not found."
        instance:
          type: "string"
          description: "Request path"
          example: "/api/v1/cart"
        message:
          type: "string"
          description: "Backward-compatible alias for detail (temporary)"
        error:
          type: "string"
          description: "Backward-compatible alias for title (temporary)"
        timestamp:
          type: "string"
          format: "date-time"
          description: "ISO-8601 timestamp"
        errors:
          type: "array"
          description: "Field-level validation errors"
          items:
            type: "object"
            properties:
              field:
                type: "string"
              message:
                type: "string"

    SuccessResponse:
      type: "object"
      description: "Standard success response format"
      required:
        - message
      properties:
        message:
          type: "string"
          description: "Success message"
          minLength: 1
          example: "Operation completed successfully"
