openapi: "3.0.3"

info:
  title: "Iced Latte Order API"
  description: "API for managing orders, including retrieving and placing orders. Supports filtering orders by status and provides detailed order information."
  version: "2.0.0"
  contact:
    name: "Iced Latte Support"
    email: "zufar.sunagatov@gmail.com"
    url: "https://github.com/Sunagatov/Iced-Latte"
  license:
    name: "CC BY-NC 4.0"
    url: "https://github.com/Sunagatov/Iced-Latte/blob/main/LICENSE"

servers:
  - url: "http://localhost:8083"
    description: "Local development server"
  - url: "https://iced-latte.uk/backend"
    description: "Production server"

security:
  - bearerAuth: []

tags:
  - name: "Orders"
    description: "Operations related to orders."

paths:
  /api/v1/orders:
    get:
      tags:
        - "Orders"
      summary: "Retrieve paginated order history for the authorized user"
      description: "Fetches orders with pagination, optional status filter, year filter, and date range."
      operationId: "getOrders"
      parameters:
        - name: "page"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
            minimum: 0
        - name: "size"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 10
            minimum: 1
            maximum: 50
        - name: "sortBy"
          in: "query"
          required: false
          schema:
            type: "string"
            default: "createdAt"
        - name: "sortDirection"
          in: "query"
          required: false
          schema:
            type: "string"
            default: "DESC"
        - name: "status"
          in: "query"
          required: false
          schema:
            type: "array"
            items:
              $ref: "#/components/schemas/OrderStatus"
        - name: "year"
          in: "query"
          required: false
          schema:
            type: "integer"
        - name: "dateFrom"
          in: "query"
          required: false
          schema:
            type: "string"
            format: "date"
        - name: "dateTo"
          in: "query"
          required: false
          schema:
            type: "string"
            format: "date"
      responses:
        "200":
          description: "Paginated list of orders."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPageDto"
        "400":
          description: "Invalid query parameters."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - "Orders"
      summary: "Place a new order for the authorized user"
      description: "Creates a new order from the authenticated user's shopping cart."
      operationId: "createOrder"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewOrderRequestDto"
      responses:
        "201":
          description: "Order successfully placed."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
        "400":
          description: "Invalid input data."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User or cart not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{orderId}:
    get:
      tags:
        - "Orders"
      summary: "Retrieve a single order by ID"
      description: "Returns full order details. Only the order owner can access."
      operationId: "getOrderById"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Order details."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
        "401":
          description: "Unauthorized access."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Access denied — not your order."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{orderId}/cancel:
    post:
      tags:
        - "Orders"
      summary: "Cancel an order"
      description: "Cancels an order if within the cancellation window. Only the order owner can cancel."
      operationId: "cancelOrder"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Order cancelled."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Access denied."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Order cannot be cancelled (wrong status or window expired)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{orderId}/refund:
    post:
      tags:
        - "Orders"
      summary: "Request a refund"
      description: "Requests a refund for a paid order. Only the order owner can request."
      operationId: "requestRefund"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequestDto"
      responses:
        "200":
          description: "Refund requested."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Access denied."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Order cannot be refunded (wrong status)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{orderId}/reorder:
    post:
      tags:
        - "Orders"
      summary: "Re-order items from a past order"
      operationId: "reorder"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Items added to cart."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReorderResponseDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Access denied."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/orders/{orderId}/history:
    get:
      tags:
        - "Orders"
      summary: "Get order status change history"
      operationId: "getOrderHistory"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Status change history."
          content:
            application/json:
              schema:
                type: "array"
                items:
                  $ref: "#/components/schemas/OrderStatusHistoryDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Access denied."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/orders:
    get:
      tags:
        - "Admin Orders"
      summary: "List all orders (admin)"
      operationId: "getAllOrders"
      parameters:
        - name: "page"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 0
        - name: "size"
          in: "query"
          required: false
          schema:
            type: "integer"
            default: 10
        - name: "status"
          in: "query"
          required: false
          schema:
            type: "array"
            items:
              $ref: "#/components/schemas/OrderStatus"
        - name: "userId"
          in: "query"
          required: false
          schema:
            type: "string"
            format: "uuid"
      responses:
        "200":
          description: "Paginated order list."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPageDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Not admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/admin/orders/{orderId}/status:
    patch:
      tags:
        - "Admin Orders"
      summary: "Update order status (admin)"
      operationId: "updateOrderStatus"
      parameters:
        - name: "orderId"
          in: "path"
          required: true
          schema:
            type: "string"
            format: "uuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminOrderStatusUpdateDto"
      responses:
        "200":
          description: "Order status updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: "Not admin."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Order not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: "Invalid transition."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token for authenticated requests"

  schemas:
    OrderStatus:
      type: "string"
      description: "The status of an order. DELIVERY and FINISHED are deprecated — use SHIPPED and DELIVERED instead."
      enum:
        - PENDING_PAYMENT
        - CREATED
        - PAID
        - DELIVERY
        - SHIPPED
        - FINISHED
        - DELIVERED
        - CANCELLED
        - REFUND_REQUESTED
        - REFUNDED
        - PAYMENT_FAILED
        - PAYMENT_EXPIRED

    OrderEvent:
      type: "string"
      description: "Events that trigger order status transitions."
      enum:
        - PENDING_PAYMENT_CONFIRMED
        - PAYMENT_FAILED_EVENT
        - PAYMENT_EXPIRED_EVENT
        - PAYMENT_CONFIRMED
        - SHIP
        - DELIVER
        - CANCEL
        - REQUEST_REFUND
        - REFUND_CONFIRMED

    CreateNewOrderRequestDto:
      type: "object"
      description: "Details required to create a new order. Provide either deliveryAddressId (saved address) or address (inline), not both."
      required:
        - recipientName
        - recipientSurname
      properties:
        deliveryAddressId:
          type: "string"
          format: "uuid"
          description: "ID of a saved delivery address. Mutually exclusive with address."
        address:
          $ref: "user-openapi.yaml#/components/schemas/AddressDto"
        recipientName:
          type: "string"
          minLength: 2
          maxLength: 128
          example: "John"
        recipientSurname:
          type: "string"
          minLength: 2
          maxLength: 128
          example: "Doe"
        recipientPhone:
          type: "string"
          example: "+12025550123"

    OrderItemDto:
      type: "object"
      description: "A single item within an order."
      properties:
        id:
          type: "string"
          format: "uuid"
        productId:
          type: "string"
          format: "uuid"
        productName:
          type: "string"
        productPrice:
          type: "number"
          format: "double"
        productsQuantity:
          type: "integer"

    OrderDto:
      type: "object"
      description: "Full order representation."
      properties:
        id:
          type: "string"
          format: "uuid"
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: "string"
          format: "date-time"
        updatedAt:
          type: "string"
          format: "date-time"
        itemsQuantity:
          type: "integer"
        itemsTotalPrice:
          type: "number"
          format: "double"
        items:
          type: "array"
          items:
            $ref: "#/components/schemas/OrderItemDto"
        deliveryAddress:
          $ref: "user-openapi.yaml#/components/schemas/AddressDto"
        recipientName:
          type: "string"
        recipientSurname:
          type: "string"
        recipientPhone:
          type: "string"
        cancellationDeadline:
          type: "string"
          format: "date-time"
        canCancel:
          type: "boolean"
        canRefund:
          type: "boolean"

    OrderSummaryDto:
      type: "object"
      description: "Lightweight order for list views."
      properties:
        id:
          type: "string"
          format: "uuid"
        status:
          $ref: "#/components/schemas/OrderStatus"
        createdAt:
          type: "string"
          format: "date-time"
        itemsQuantity:
          type: "integer"
        itemsTotalPrice:
          type: "number"
          format: "double"
        firstItemName:
          type: "string"
        itemCount:
          type: "integer"
          description: "Total number of distinct items in the order."

    OrderPageDto:
      type: "object"
      description: "Paginated order list."
      properties:
        content:
          type: "array"
          items:
            $ref: "#/components/schemas/OrderSummaryDto"
        page:
          type: "integer"
        size:
          type: "integer"
        totalElements:
          type: "integer"
          format: "int64"
        totalPages:
          type: "integer"

    ErrorResponse:
      $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"

    RefundRequestDto:
      type: "object"
      description: "Optional refund request details."
      properties:
        reason:
          type: "string"
          maxLength: 500
          description: "Reason for the refund request."
          example: "Product arrived damaged"

    ReorderResponseDto:
      type: "object"
      description: "Result of a re-order operation."
      properties:
        cartId:
          type: "string"
          format: "uuid"
        addedItems:
          type: "integer"
        unavailableItems:
          type: "array"
          items:
            $ref: "#/components/schemas/UnavailableItemDto"

    UnavailableItemDto:
      type: "object"
      properties:
        productName:
          type: "string"
        reason:
          type: "string"

    AdminOrderStatusUpdateDto:
      type: "object"
      description: "Admin request to update order status."
      required:
        - event
      properties:
        event:
          $ref: "#/components/schemas/OrderEvent"
        reason:
          type: "string"
          maxLength: 500

    OrderStatusHistoryDto:
      type: "object"
      description: "A single status change entry."
      properties:
        id:
          type: "string"
          format: "uuid"
        orderId:
          type: "string"
          format: "uuid"
        oldStatus:
          $ref: "#/components/schemas/OrderStatus"
        newStatus:
          $ref: "#/components/schemas/OrderStatus"
        changedBy:
          type: "string"
          format: "uuid"
        reason:
          type: "string"
        changedAt:
          type: "string"
          format: "date-time"
