openapi: "3.0.3"

info:
  title: "Iced Latte Payment API"
  description: "API for accessing payment and related operations in the Iced-Latte platform"
  version: "1.0.0"
  contact:
    name: "Iced Latte Support"
    email: "zufar.sunagatov@gmail.com"
    url: "https://github.com/Sunagatov/Iced-Latte"
  license:
    name: "MIT"
    url: "https://github.com/Sunagatov/Iced-Latte/blob/main/LICENSE"

servers:
  - url: "http://localhost:8083"
    description: "Local development server"
  - url: "https://iced-latte.uk/backend"
    description: "Production server"

security:
  - bearerAuth: []

tags:
  - name: "Payment"
    description: "An API for managing and retrieving payment information"

paths:
  /api/v1/payment:
    post:
      tags:
        - "Payment"
      summary: "Creates Stripe Session for an authorized user"
      description: "Initiates a Stripe payment session for the authenticated user's current order and returns the client secret."
      operationId: "processPayment"
      responses:
        "200":
          description: "Session created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithClientSecretDto"
        "400":
          description: "Cannot create session"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/payment/order:
    get:
      tags:
        - "Payment"
      summary: "Stripe checkout redirect callback"
      description: "Called by Stripe after a successful checkout session. Processes the session and creates the corresponding order."
      operationId: "processRedirectEvent"
      parameters:
        - name: "sessionId"
          description: "Stripe checkout session ID"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Order created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentConfirmationEmail"
        "400":
          description: "Cannot create order"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "Stripe session not found"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SessionWithClientSecretDto:
      type: "object"
      description: "Contains the Stripe session ID and client secret required to complete the payment on the frontend."
      required:
        - sessionId
        - clientSecret
      properties:
        sessionId:
          type: "string"
          description: "The Stripe checkout session ID."
        clientSecret:
          type: "string"
          description: "The client secret used to confirm the payment on the client side."

    PaymentConfirmationEmail:
      type: "object"
      description: "Contains the customer email address for payment confirmation notification."
      required:
        - customerEmail
      properties:
        customerEmail:
          type: "string"
          description: "The email address of the customer who completed the payment."

    ErrorResponse:
      $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
