openapi: "3.0.3"

info:
  title: "Iced Latte Payment API"
  description: "API for accessing payment and related operations in the Iced-Latte platform"
  version: "1.0.0"
  contact:
    name: "Iced Latte Support"
    email: "zufar.sunagatov@gmail.com"
    url: "https://github.com/Sunagatov/Iced-Latte"
  license:
    name: "MIT"
    url: "https://github.com/Sunagatov/Iced-Latte/blob/main/LICENSE"

servers:
  - url: "http://localhost:8083"
    description: "Local development server"
  - url: "https://iced-latte.uk/backend"
    description: "Production server"

security:
  - bearerAuth: []

tags:
  - name: "Payment"
    description: "An API for managing and retrieving payment information"

paths:
  /api/v1/payment:
    post:
      tags:
        - "Payment"
      summary: "Creates Stripe Session for an authorized user"
      operationId: "processPayment"
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "Session created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithClientSecretDto"
        "400":
          description: "Cannot create session"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/payment/order:
    get:
      tags:
        - "Payment"
      summary: "Creates Order after Stripe checkout session completion"
      operationId: "processRedirectEvent"
      parameters:
        - name: "sessionId"
          description: "Stripe checkout session ID"
          in: "query"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "Order created successfully"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentConfirmationEmail"
        "400":
          description: "Cannot create order"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PaymentStatus:
      type: "object"
      properties:
        status:
          type: "string"
        description:
          type: "string"

    SessionWithClientSecretDto:
      type: "object"
      properties:
        sessionId:
          type: "string"
        clientSecret:
          type: "string"

    PaymentConfirmationEmail:
      type: "object"
      properties:
        customerEmail:
          type: "string"

    ErrorResponse:
      type: "object"
      description: "Standard error response format"
      required:
        - message
        - timestamp
        - status
      properties:
        message:
          type: "string"
          description: "Error message"
        details:
          type: "array"
          items:
            type: "string"
          description: "Additional error details"
        timestamp:
          type: "string"
          format: "date-time"
          description: "Error timestamp"
        status:
          type: "integer"
          description: "HTTP status code"
        path:
          type: "string"
          description: "Request path that caused the error"
