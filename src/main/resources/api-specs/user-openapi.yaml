openapi: "3.0.3"

info:
  title: "Iced Latte User API"
  description: "API for accessing user profiles and related operations in the Iced-Latte platform."
  version: "1.0.0"
  contact:
    name: "Iced Latte Support"
    email: "zufar.sunagatov@gmail.com"
    url: "https://github.com/Sunagatov/Iced-Latte"
  license:
    name: "MIT"
    url: "https://github.com/Sunagatov/Iced-Latte/blob/main/LICENSE"

servers:
  - url: "https://localhost:8083"
    description: "Local development server"
  - url: "https://iced-latte.uk/backend"
    description: "Production server"

security:
  - bearerAuth: []

tags:
  - name: "User"
    description: "Operations related to user profiles."

paths:
  /api/v1/users:

    get:
      tags:
        - "User"
      summary: "Get user profile"
      description: "Fetch detailed information about the authenticated user."
      operationId: "getUserProfile"
      responses:
        "200":
          description: "A user object containing detailed user information."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      tags:
        - "User"
      summary: "Edit user profile"
      description: "Update the authenticated user's profile details."
      operationId: "editUserProfile"
      requestBody:
        description: "Payload containing the user's updated details."
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserAccountRequest"
      responses:
        "200":
          description: "The updated user object."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDto"
        "400":
          description: "Invalid input data."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags:
        - "User"
      summary: "Change user password"
      description: "Change the password for the authenticated user."
      operationId: "changeUserPassword"
      requestBody:
        description: "Payload containing the old and new passwords."
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeUserPasswordRequest"
      responses:
        "200":
          description: "Password changed successfully."
        "400":
          description: "Validation error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPassword:
                  value: { "message": "Password must be at least 8 characters long and contain at least one letter, one digit, and may include special characters @$!%*?&." }
        "401":
          description: "Unauthorized access or invalid old password."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - "User"
      summary: "Delete user profile"
      description: "Delete the authenticated user's profile."
      operationId: "deleteUserProfile"
      responses:
        "200":
          description: "User successfully deleted."
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/password/reset:
    post:
      tags:
        - "User"
      summary: "Reset user password"
      description: "Initiate a user password reset."
      operationId: "resetUserPassword"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePasswordResetRequest"
      responses:
        "200":
          description: "Password reset request confirmed successfully."
        "400":
          description: "Invalid request."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: "Too many requests. Rate limit exceeded."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/password/reset/confirm:
    post:
      tags:
        - "User"
      summary: "Confirm password reset"
      description: "Confirm a user's password reset."
      operationId: "confirmResetUserPassword"
      requestBody:
        description: "Payload containing the reset token and new password."
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmPasswordResetRequest"
      responses:
        "200":
          description: "Password reset confirmed successfully."
        "400":
          description: "Invalid or expired reset token."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/addresses:
    get:
      tags:
        - "User"
      summary: "Get delivery addresses"
      operationId: "getDeliveryAddresses"
      responses:
        "200":
          description: "List of delivery addresses."
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryAddressDto"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - "User"
      summary: "Add delivery address"
      operationId: "addDeliveryAddress"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAddressRequest"
      responses:
        "201":
          description: "Address created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAddressDto"
        "400":
          description: "Invalid input."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/addresses/{addressId}:
    put:
      tags:
        - "User"
      summary: "Update delivery address"
      operationId: "updateDeliveryAddress"
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryAddressRequest"
      responses:
        "200":
          description: "Address updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAddressDto"
        "404":
          description: "Address not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - "User"
      summary: "Delete delivery address"
      operationId: "deleteDeliveryAddress"
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: "Address deleted."
        "404":
          description: "Address not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/addresses/{addressId}/default:
    patch:
      tags:
        - "User"
      summary: "Set default delivery address"
      operationId: "setDefaultDeliveryAddress"
      parameters:
        - name: addressId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: "Default address updated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryAddressDto"
        "404":
          description: "Address not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/avatar:
    post:
      tags:
        - "User"
      summary: "Upload user avatar"
      description: "Upload a user's avatar image."
      operationId: "uploadUserAvatar"
      requestBody:
        description: "Payload containing the avatar image file."
        required: true
        content:
          multipart/form-data:
            schema:
              title: "uploadUserAvatar_request"
              type: "object"
              properties:
                file:
                  type: "string"
                  format: "binary"
      responses:
        "200":
          description: "User avatar uploaded successfully."
        "400":
          description: "Invalid file format or size."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: "User not found."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags:
        - "User"
      summary: "Get user avatar link"
      description: "Retrieve the link to the authenticated user's avatar image."
      operationId: "getUserAvatarLink"
      responses:
        "200":
          description: "User avatar link retrieved successfully."
          content:
            application/json:
              schema:
                type: "string"
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - "User"
      summary: "Delete user avatar"
      description: "Delete the authenticated user's avatar image."
      operationId: "deleteUserAvatar"
      responses:
        "200":
          description: "User avatar deleted successfully."
        "401":
          description: "Unauthorized access. Authentication required."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: "Internal Server Error."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT token for authenticated requests"

  schemas:
    UpdateUserAccountRequest:
      type: "object"
      description: "Payload containing the user's updated details."
      properties:
        firstName:
          type: "string"
          description: "The first name of the user."
          minLength: 2
          maxLength: 64
          pattern: "^[a-zA-Z\\u00C0-\\u00D6\\u00D8-\\u00F6\\u00F8-\\u00FF\\s''\\-]+$"
          x-field-extra-annotation: "@jakarta.validation.constraints.NotNull(message = \"First name is required\")"
          example: "John"
        lastName:
          type: "string"
          description: "The last name of the user."
          minLength: 2
          maxLength: 64
          pattern: "^[a-zA-Z\\u00C0-\\u00D6\\u00D8-\\u00F6\\u00F8-\\u00FF\\s''\\-]+$"
          x-field-extra-annotation: "@jakarta.validation.constraints.NotNull(message = \"Last name is required\")"
          example: "Doe"
        birthDate:
          type: "string"
          description: "The birth date of the user."
          format: date
        phoneNumber:
          type: "string"
          description: "The phone number of the user."
          example: "+1234567890"
        address:
          $ref: "#/components/schemas/AddressDto"

    PasswordField:
      type: "string"
      description: "Password must be between 8 and 128 characters, with at least one letter, one digit, and may include special characters @$!%*?&."
      minLength: 8
      maxLength: 128
      pattern: "^(?=.*[A-Za-z])(?=.*\\d)[A-Za-z\\d@$!%*?&]{8,}$"

    ChangeUserPasswordRequest:
      type: "object"
      description: "Payload for changing user password."
      required:
        - newPassword
        - oldPassword
      properties:
        newPassword:
          allOf:
            - $ref: "#/components/schemas/PasswordField"
          example: "NewPassword123!"
        oldPassword:
          allOf:
            - $ref: "#/components/schemas/PasswordField"
          example: "OldPassword123!"

    UserDto:
      type: "object"
      description: "A user profile in the Iced-Latte system."
      required:
        - firstName
        - lastName
        - email
      properties:
        id:
          type: "string"
          format: "uuid"
          description: "The unique identifier for the user."
        firstName:
          type: "string"
          minLength: 2
          maxLength: 64
          description: "The first name of the user."
        lastName:
          type: "string"
          minLength: 2
          maxLength: 64
          description: "The last name of the user."
        birthDate:
          type: "string"
          description: "The birth date of the user."
          format: date
        phoneNumber:
          type: "string"
          description: "The phone number of the user."
        stripeCustomerToken:
          type: "string"
          description: "The Stripe customer token associated with the user."
        email:
          type: "string"
          description: "The email address of the user."
          format: "email"
        address:
          $ref: "#/components/schemas/AddressDto"
        avatarLink:
          type: "string"
          description: "The avatar URL of the user."

    AddressDto:
      type: "object"
      description: "Address details of the user."
      properties:
        country:
          type: "string"
          minLength: 2
          maxLength: 128
          description: "The country of the address."
          example: "United Kingdom"
        city:
          type: "string"
          minLength: 2
          maxLength: 128
          description: "The city of the address."
          example: "London"
        line:
          type: "string"
          minLength: 2
          maxLength: 128
          description: "The address line."
          example: "123 Coffee St."
        postcode:
          type: "string"
          minLength: 2
          maxLength: 128
          description: "The postal code of the address."
          example: "E1 6AN"

    InitiatePasswordResetRequest:
      type: "object"
      description: "Payload to initiate a password reset."
      required:
        - email
      properties:
        email:
          type: "string"
          format: "email"
          description: "The email address of the user requesting a password reset."

    ConfirmPasswordResetRequest:
      type: "object"
      description: "Payload to confirm a password reset."
      required:
        - token
        - newPassword
      properties:
        token:
          type: "string"
          description: "The password reset token."
        newPassword:
          allOf:
            - $ref: "#/components/schemas/PasswordField"
          example: "NewSecurePassword123!"

    DeliveryAddressDto:
      type: "object"
      description: "A saved delivery address."
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
          example: "Home"
        line:
          type: string
          example: "123 Coffee St"
        city:
          type: string
          example: "London"
        country:
          type: string
          example: "United Kingdom"
        postcode:
          type: string
          example: "E1 6AN"
        isDefault:
          type: boolean

    DeliveryAddressRequest:
      type: "object"
      required:
        - label
        - line
        - city
        - country
        - postcode
      properties:
        label:
          type: string
          minLength: 1
          maxLength: 64
          example: "Home"
        line:
          type: string
          minLength: 1
          maxLength: 256
          example: "123 Coffee St"
        city:
          type: string
          minLength: 1
          maxLength: 128
          example: "London"
        country:
          type: string
          minLength: 1
          maxLength: 128
          example: "United Kingdom"
        postcode:
          type: string
          minLength: 1
          maxLength: 16
          example: "E1 6AN"

    ErrorResponse:
      $ref: "common-schemas.yaml#/components/schemas/ErrorResponse"
