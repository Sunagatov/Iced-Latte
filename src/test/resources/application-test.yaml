#
# Google Auth Properties
#
google:
  auth:
    server:
      url: "https://accounts.google.com/o/oauth2/v2/auth"
  scope: "https://www.googleapis.com/auth/userinfo.profile"
  client-id: "sk-api-client"
  client-secret: "sk-api-secret"
  authenticate-uri: "http://localhost:8083/auth/login"
  redirect-uri: "http://localhost:8083"

aws:
  account-id: test-account-id

stripe:
  secret-key: "sk_test_placeholder"
  webhook-secret: "whsec_test_placeholder"

#
# Monitoring Properties
#
monitoring:
  slow-query-threshold-ms: 200

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    org.springframework.boot.autoconfigure.orm.jpa.JpaBaseConfiguration: ERROR

#
# Rate Limiting Properties (disabled for tests)
#
security:
  argon2:
    memory: 1024     # minimum required by Argon2
    iterations: 1    # reduced from 2 to speed up tests
  rate-limit:
    global:
      max-requests: 100000
      window-duration: PT1M
    auth:
      max-requests: 100000
      window-duration: PT1M
    ai:
      max-requests: 100000
      window-duration: PT1M
    search:
      max-requests: 100000
      window-duration: PT1M

