# =============================================================================
#                    ICED LATTE — TEST PROFILE OVERRIDES
# =============================================================================
# Activated by: tests (src/test/resources)
# Purpose: Fast, isolated, deterministic. All external integrations disabled,
#          rate limits removed, Argon2 weakened for speed, Testcontainers
#          provides PostgreSQL and Redis.
# =============================================================================


# ─────────────────────────────────────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────────────────────────────────────
server:
  port: 8083
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false


# ─────────────────────────────────────────────────────────────────────────────
# ACTUATOR
# ─────────────────────────────────────────────────────────────────────────────
management:
  server:
    port: 8083
  health:
    mail:
      enabled: false


# ─────────────────────────────────────────────────────────────────────────────
# SPRING CORE — DATABASE (Testcontainers provides the actual instance)
# ─────────────────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb?serverTimezone=UTC
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        # Allow metadata access in tests for schema validation.
        allow_jdbc_metadata_access: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.yaml

  # --- AWS / Object Storage — disabled in tests ---
  aws:
    enabled: false
    account-id: test-account-id
    access-key: vbfgngfdndgndgndgndgndgndgndg
    secret-key: vbfgngfdndgndgndgndgndgndgndg
    region: us-east-1
    buckets:
      products: products
      user-avatar: users
    link-expiration-time: PT1H
    read-timeout: 10s
    connect-timeout: 10s
    write-timeout: 60s
    secure: false
    default-image-directory:
      products: ./products

  # --- Redis (Testcontainers provides the instance) ---
  data:
    redis:
      host: localhost
      port: 6379

  # --- Email — disabled, placeholder values ---
  mail:
    host: smtp.gmail.com
    port: 587
    username: youricedlatteshop@gmail.com
    password: test_mail_password_placeholder


# ─────────────────────────────────────────────────────────────────────────────
# EMAIL & VERIFICATION TOKENS
# ─────────────────────────────────────────────────────────────────────────────
temporary-cache:
  time:
    token: 5


# ─────────────────────────────────────────────────────────────────────────────
# SECURITY — weakened for test speed, rate limits effectively disabled
# ─────────────────────────────────────────────────────────────────────────────

# Test-only JWT secrets (base64-encoded dummy keys — never use in production).
jwt:
  header: Authorization
  secret: NDA0RTYzNTI2NjU1NkE1ODZFMzI3MjM1NzUzODc4MkY0MTNBNDQ0Mjg0NzJCNEI2MjUwNjQ1MzY3NTY2QjU5NzA=
  expiration: PT30M
  refresh-secret: NDA0RTYzNTI2NjU1NkE1ODZFMzI3MjM1NzUzODc4MkY0MTNBNDQ0Mjg0NzJCNEI2MjUwNjQ1MzY3NTY2QjU5NzA0MDRFNTM1MjY2NTU2QTU4NkUzMjcyMzU3NTM4NzgyRjQxM0E0NDQyODQ3MkI0QjYyNTA2NDUzNjc1NjZCNTk3MA==
  refresh-expiration: PT168H
  issuer: iced-latte
  audience: iced-latte-users
  # Test user fixture credentials — used by integration tests to authenticate.
  email: olivia@example.com
  password: p@ss1logic11

security:
  argon2:
    # Minimum values to make password hashing fast in tests.
    memory: 1024
    iterations: 1
  # All rate limits set to 100k — effectively disabled so tests don't get throttled.
  rate-limit:
    global:
      max-requests: 100000
      window-duration: PT1M
    auth:
      max-requests: 100000
      window-duration: PT1M
    search:
      max-requests: 100000
      window-duration: PT1M
    telemetry:
      max-requests: 100000
      window-duration: PT1M
    pre-auth:
      max-requests: 100000
      window-duration: PT1M
    payment:
      max-requests: 100000
      window-duration: PT1M


# ─────────────────────────────────────────────────────────────────────────────
# INTEGRATIONS — all disabled with safe placeholder values
# ─────────────────────────────────────────────────────────────────────────────
ai:
  api-key: "sk-test-placeholder"
  base-url: "https://models.example.test"
  model-name: gpt-4o-mini

google:
  auth:
    server:
      url: "https://accounts.google.com/o/oauth2/v2/auth"
  scope: "https://www.googleapis.com/auth/userinfo.profile"
  client-id: "sk-api-client"
  client-secret: "sk-api-secret"
  authenticate-uri: "http://localhost:8083/auth/login"
  redirect-uri: "http://localhost:8083"

aws:
  account-id: test-account-id

stripe:
  secret-key: "sk_test_placeholder"
  webhook-secret: "whsec_test_placeholder"

problem:
  type-base-url: "https://errors.example.test/problems"


# ─────────────────────────────────────────────────────────────────────────────
# OBSERVABILITY — minimal, suppress noisy framework logs
# ─────────────────────────────────────────────────────────────────────────────
monitoring:
  slow-query-threshold-ms: 200

logging:
  level:
    # Suppress noisy Spring Security auto-config warnings during tests.
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR
    org.springframework.boot.hibernate.autoconfigure.HibernateJpaConfiguration: ERROR
