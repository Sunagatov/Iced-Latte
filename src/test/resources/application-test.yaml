#
# Server Properties
#
server:
  port: 8083
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
    include-exception: false

#
# Management Properties
#
management:
  server:
    port: 8083

spring:
  #
  # Database Properties
  #
  datasource:
    url: jdbc:postgresql://localhost:5432/testdb?serverTimezone=UTC
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog-master.yaml
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    drop-first: true

  #
  # Aws Properties
  #
  aws:
    enabled: false
    account-id: test-account-id
    access-key: vbfgngfdndgndgndgndgndgndgndg
    secret-key: vbfgngfdndgndgndgndgndgndgndg
    region: us-east-1
    buckets:
      products: products
      user-avatar: users
    link-expiration-time: PT1H
    read-timeout: 10s
    connect-timeout: 10s
    write-timeout: 60s
    secure: false
    default-image-directory:
      products: ./products

  #
  # Redis (used by RedisJwtBlacklistService in tests via Testcontainers)
  #
  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: youricedlatteshop@gmail.com
    password: test_mail_password_placeholder

