# OpenTelemetry Collector — Iced Latte Production
#
# Pipeline: App (OTLP HTTP :4318) → batch → Grafana Cloud (single OTLP endpoint)
# Auth: basicauth extension with GRAFANA_CLOUD_OTLP_USERNAME / PASSWORD env vars
# Credentials: from Grafana Cloud → Connections → OpenTelemetry tile

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    timeout: 5s
    send_batch_size: 1024

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  basicauth/grafana_cloud:
    client_auth:
      username: ${env:GRAFANA_CLOUD_OTLP_USERNAME}
      password: ${env:GRAFANA_CLOUD_OTLP_PASSWORD}

exporters:
  otlphttp/grafana_cloud:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    auth:
      authenticator: basicauth/grafana_cloud
    compression: gzip

service:
  extensions: [health_check, basicauth/grafana_cloud]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana_cloud]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana_cloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/grafana_cloud]
  telemetry:
    logs:
      level: warn
