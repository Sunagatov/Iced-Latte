version: '3'

vars:
  OBS_DIR: ops/observability
  COMPOSE_FILE: ops/observability/docker-compose.yml
  LOGGING_NETWORK: iced-latte-network
  GRAFANA_URL: http://localhost:3001
  PROMETHEUS_URL: http://localhost:9090
  LOKI_URL: http://localhost:3100
  KIBANA_URL: http://localhost:5601
  ELASTICSEARCH_URL: http://localhost:9200

tasks:
  docker-ready:
    internal: true
    silent: true
    desc: Check that Docker and Docker Compose are installed and Docker Desktop/daemon is running
    cmds:
      - |
        if ! command -v docker >/dev/null 2>&1; then
          echo "❌ Docker is not installed."
          echo "💡 Install Docker Desktop: https://www.docker.com/products/docker-desktop/"
          exit 1
        fi

        if ! docker compose version >/dev/null 2>&1; then
          echo "❌ Docker Compose is not available."
          echo "💡 Ensure Docker Desktop is installed correctly and 'docker-compose' works in your terminal."
          exit 1
        fi

        if ! docker info >/dev/null 2>&1; then
          echo "❌ Docker is installed but not running."
          echo "💡 Start Docker Desktop (or Docker daemon) and wait until it is ready."
          exit 1
        fi

  logging-network-ready:
    internal: true
    silent: true
    desc: Ensure the shared Docker network exists for observability containers
    deps: [docker-ready]
    cmds:
      - |
        if ! docker network inspect {{.LOGGING_NETWORK}} >/dev/null 2>&1; then
          echo "🕸️ Creating shared Docker network {{.LOGGING_NETWORK}}..."
          docker network create {{.LOGGING_NETWORK}} >/dev/null
        fi

  loki-up:
    silent: true
    desc: Start Loki + Promtail + Prometheus + Grafana
    deps: [docker-ready, logging-network-ready]
    cmds:
      - echo "🚀 Starting Loki / Grafana / Prometheus stack..."
      - docker compose -f {{.COMPOSE_FILE}} --profile loki up -d
      - echo "✅ Loki stack is starting."

  loki-down:
    silent: true
    desc: Stop Loki + Promtail + Prometheus + Grafana
    deps: [docker-ready]
    cmds:
      - echo "🛑 Stopping Loki stack..."
      - docker compose -f {{.COMPOSE_FILE}} stop loki promtail prometheus grafana
      - echo "✅ Loki stack stopped."

  elk-up:
    silent: true
    desc: Start Elasticsearch + Logstash + Filebeat + Kibana
    deps: [docker-ready, logging-network-ready]
    cmds:
      - echo "🚀 Starting ELK stack..."
      - docker compose -f {{.COMPOSE_FILE}} --profile elk up -d
      - echo "✅ ELK stack is starting."

  elk-down:
    silent: true
    desc: Stop Elasticsearch + Logstash + Filebeat + Kibana
    deps: [docker-ready]
    cmds:
      - echo "🛑 Stopping ELK stack..."
      - docker compose -f {{.COMPOSE_FILE}} stop elasticsearch logstash filebeat kibana
      - echo "✅ ELK stack stopped."

  down:
    silent: true
    desc: Stop all observability containers without deleting volumes
    deps: [docker-ready]
    cmds:
      - echo "🛑 Stopping all observability stacks..."
      - docker compose -f {{.COMPOSE_FILE}} --profile loki --profile elk down --remove-orphans
      - echo "✅ Observability stacks stopped."

  reset:
    silent: true
    desc: Stop observability stacks and delete observability volumes
    deps: [docker-ready]
    cmds:
      - echo "♻️ Resetting observability stacks and deleting volumes..."
      - docker compose -f {{.COMPOSE_FILE}} --profile loki --profile elk down -v --remove-orphans
      - echo "✅ Observability reset complete."

  status:
    silent: true
    desc: Show observability container status
    deps: [docker-ready]
    cmds:
      - echo "📊 Observability stack status:"
      - docker compose -f {{.COMPOSE_FILE}} ps

  logs-loki:
    silent: true
    desc: Follow logs for Loki stack
    deps: [docker-ready]
    cmds:
      - echo "📜 Following Loki stack logs..."
      - docker compose -f {{.COMPOSE_FILE}} logs -f loki promtail prometheus grafana

  logs-elk:
    silent: true
    desc: Follow logs for ELK stack
    deps: [docker-ready]
    cmds:
      - echo "📜 Following ELK stack logs..."
      - docker compose -f {{.COMPOSE_FILE}} logs -f elasticsearch logstash filebeat kibana

  urls:
    silent: true
    desc: Print useful local URLs for observability tools
    cmds:
      - echo "🔗 Observability URLs:"
      - 'echo "Grafana:       {{.GRAFANA_URL}}"'
      - 'echo "Prometheus:    {{.PROMETHEUS_URL}}"'
      - 'echo "Loki:          {{.LOKI_URL}}"'
      - 'echo "Kibana:        {{.KIBANA_URL}}"'
      - 'echo "Elasticsearch: {{.ELASTICSEARCH_URL}}"'
