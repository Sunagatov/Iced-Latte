name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Deploy and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: zufarexplainedit/iced-latte-backend
          tags: |
            type=sha,prefix=master-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Oracle Cloud VM
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          IMAGE: zufarexplainedit/iced-latte-backend:latest
        run: |
          echo "${OCI_SSH_KEY}" > /tmp/oci_key && chmod 600 /tmp/oci_key
          ssh -o StrictHostKeyChecking=no -i /tmp/oci_key ${OCI_USER}@${OCI_HOST} "
            docker pull ${IMAGE} &&
            docker stop iced-latte-backend 2>/dev/null || true &&
            docker rm   iced-latte-backend 2>/dev/null || true &&
            docker run -d --name iced-latte-backend --restart unless-stopped \
              --env-file /home/${OCI_USER}/iced-latte.env \
              -p 8083:8083 \
              --memory=768m --memory-swap=768m \
              -e JAVA_TOOL_OPTIONS='-Xmx384m -XX:MaxMetaspaceSize=128m' \
              -e APP_VERSION=${{ github.sha }} \
              ${IMAGE}
          "
          rm -f /tmp/oci_key

      - name: Wait for application to come up
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
        run: |
          echo "Waiting for deploy to complete..."
          sleep 60
          for i in $(seq 1 36); do
            STATUS=$(curl -sf "http://${OCI_HOST}:8083/actuator/health" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "UP" ]; then
              echo "[OK] Application is UP"
              exit 0
            fi
            echo "Attempt $i/36 — waiting 10s..."
            sleep 10
          done
          echo "[FAIL] Health check timed out after 6 minutes"
          exit 1

      - name: Notify success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${BOT_TOKEN}/sendMessage \
            -d chat_id=${CHAT_ID} \
            -d text="[OK] Iced Latte deployed to production%0ARepo: ${REPO}%0ASha: ${SHA:0:7}%0ABy: ${ACTOR}%0AMsg: ${MSG}%0A${RUN_URL}"

      - name: Notify failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${BOT_TOKEN}/sendMessage \
            -d chat_id=${CHAT_ID} \
            -d text="[FAIL] Iced Latte deploy FAILED%0ARepo: ${REPO}%0ASha: ${SHA:0:7}%0ABy: ${ACTOR}%0AMsg: ${MSG}%0A${RUN_URL}"

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # 0.56.1
        with:
          image-ref: zufarexplainedit/iced-latte-backend:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Notify Telegram on success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${BOT_TOKEN}/sendMessage \
            -d chat_id=${CHAT_ID} \
            -d text="[OK] Trivy: No HIGH/CRITICAL vulnerabilities%0ARepo: ${REPO}%0ASha: ${SHA:0:7}%0ABy: ${ACTOR}%0AMsg: ${MSG}%0A${RUN_URL}"

      - name: Notify Telegram on failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          MSG: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s -X POST https://api.telegram.org/bot${BOT_TOKEN}/sendMessage \
            -d chat_id=${CHAT_ID} \
            -d text="[ALERT] Trivy: HIGH/CRITICAL vulnerabilities found%0ARepo: ${REPO}%0ASha: ${SHA:0:7}%0ABy: ${ACTOR}%0AMsg: ${MSG}%0A${RUN_URL}"
