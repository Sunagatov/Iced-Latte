name: CD

on:
  push:
    branches: [master]

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, Deploy and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: zufarexplainedit/iced-latte-backend
          tags: |
            type=sha,prefix=master-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Wait for application to come up
        run: |
          echo "Waiting for deploy to complete..."
          for i in $(seq 1 36); do
            STATUS=$(curl -sf "${{ secrets.RENDER_APP_URL }}/actuator/health" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
            if [ "$STATUS" = "UP" ]; then
              echo "✅ Application is UP"
              exit 0
            fi
            echo "Attempt $i/36 — waiting 10s..."
            sleep 10
          done
          echo "❌ Health check timed out after 6 minutes"
          exit 1

      - name: Notify success
        if: success()
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, urllib.parse
          msg = f"✅ *Iced Latte deployed to production*\n\nCommit: `{os.environ['SHA'][:7]}`\nBy: {os.environ['ACTOR']}\n{os.environ['COMMIT_MSG']}"
          data = urllib.parse.urlencode({"chat_id": os.environ["CHAT_ID"], "text": msg, "parse_mode": "Markdown"}).encode()
          urllib.request.urlopen(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage", data)
          EOF

      - name: Notify failure
        if: failure()
        env:
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import os, urllib.request, urllib.parse
          msg = f"❌ *Iced Latte deploy FAILED*\n\nCommit: `{os.environ['SHA'][:7]}`\nBy: {os.environ['ACTOR']}\nSee: {os.environ['RUN_URL']}"
          data = urllib.parse.urlencode({"chat_id": os.environ["CHAT_ID"], "text": msg, "parse_mode": "Markdown"}).encode()
          urllib.request.urlopen(f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage", data)
          EOF
