name: Architecture Governance

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

jobs:
  architecture:
    name: Module Boundaries & ArchUnit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: temurin
          cache: maven

      - name: Run Spring Modulith and ArchUnit checks
        run: mvn -B test -Dtest='ModularityTests,ArchitectureRulesTest' --no-transfer-progress
