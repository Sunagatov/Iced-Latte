name: Build and Deploy

on:
  push:
    branches:
      - development
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-push-docker-image:
    name: Build and push a new docker image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout the source code from the Github repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_ACCOUNT_NAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_HUB_ACCOUNT_NAME }}/${{ vars.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
          flavor: |
            latest=false

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # primary deploy tag is steps.meta.outputs.version (sha-based)
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-app-to-server:
    name: Deploy application to remote server via SSH
    runs-on: ubuntu-latest
    needs: build-and-push-docker-image
    steps:
      - name: Deploy image via SSH
        uses: appleboy/ssh-action@v1.0.0
        timeout-minutes: 10
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          port: ${{ secrets.DEV_SSH_PORT }}
          username: ${{ secrets.DEV_SSH_USER }}
          password: ${{ secrets.DEV_SSH_PASSWORD }}
          envs: IMAGE_TAG
          command_timeout: 8m
          script_stop: true
          script: |
            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ vars.DOCKER_HUB_ACCOUNT_NAME }} --password-stdin || { echo "Docker login failed"; exit 1; }
            
            # Check if image already exists locally
            if ! docker image inspect $IMAGE_TAG >/dev/null 2>&1; then
              docker pull $IMAGE_TAG || exit 1
            else
              echo "Image $IMAGE_TAG already exists locally, skipping pull"
            fi
            
            # Graceful container update
            if docker ps -q -f name=${{ vars.DOCKER_CONTAINER_NAME }}; then
              docker stop ${{ vars.DOCKER_CONTAINER_NAME }} || { echo "Failed to stop container"; exit 1; }
              docker rm ${{ vars.DOCKER_CONTAINER_NAME }} || { echo "Failed to remove container"; exit 1; }
            fi
            
            # Clean up old images (keep last 3)
            docker images ${{ vars.DOCKER_HUB_ACCOUNT_NAME }}/${{ vars.DOCKER_IMAGE_NAME }} --format "table {{.Repository}}:{{.Tag}}\t{{.CreatedAt}}" | tail -n +4 | awk '{print $1}' | xargs -r docker rmi 2>&1 | grep -v "image is being used" || { echo "Image cleanup warning (non-fatal)"; true; }
            
            docker run -d \
              --name ${{ vars.DOCKER_CONTAINER_NAME }} \
              --network=${{ vars.DOCKER_NETWORK }} \
              --restart=unless-stopped \
              --env-file <(cat <<EOF
            APP_SERVER_PORT=${{ vars.APP_SERVER_PORT }}
            SPRING_PROFILES_ACTIVE=prod
            APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
            APP_JWT_REFRESH_SECRET=${{ secrets.APP_JWT_REFRESH_SECRET }}
            DATASOURCE_PORT=${{ vars.DATASOURCE_PORT }}
            DATASOURCE_NAME=${{ vars.DATASOURCE_NAME }}
            DATASOURCE_USERNAME=${{ vars.DATASOURCE_USERNAME }}
            DATASOURCE_PASSWORD=${{ secrets.DATASOURCE_PASSWORD }}
            DATASOURCE_HOST=${{ vars.DATASOURCE_HOST }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            AWS_REGION=${{ vars.AWS_REGION }}
            AWS_USER_BUCKET=${{ vars.AWS_USER_BUCKET }}
            AWS_PRODUCT_BUCKET=${{ vars.AWS_PRODUCT_BUCKET }}
            AWS_DEFAULT_PRODUCT_IMAGES_PATH=${{ vars.AWS_DEFAULT_PRODUCT_IMAGES_PATH }}
            GOOGLE_AUTH_CLIENT_ID=${{ vars.GOOGLE_AUTH_CLIENT_ID }}
            GOOGLE_AUTH_CLIENT_SECRET=${{ vars.GOOGLE_AUTH_CLIENT_SECRET }}
            GOOGLE_AUTH_REDIRECT_URI=${{ vars.GOOGLE_AUTH_REDIRECT_URI }}
            REDIS_PORT=${{ vars.REDIS_PORT }}
            SPRING_AI_OPENAI_API_KEY=${{ secrets.SPRING_AI_OPENAI_API_KEY }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            MAIL_USERNAME=${{ vars.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF
            ) \
              -v ${{ vars.APP_DATA_PATH_ON_THE_REMOTE_SERVER }}:/usr/app/logs \
              -v ${{ vars.APP_DATA_PATH_ON_THE_REMOTE_SERVER }}/products:/usr/app/products \
              $IMAGE_TAG || { echo "docker run failed"; exit 1; }
            
            # Verify container is running and application is ready
            sleep 5
            docker inspect -f '{{.State.Running}}' ${{ vars.DOCKER_CONTAINER_NAME }} | grep -q true || { echo "Container failed to start"; docker logs ${{ vars.DOCKER_CONTAINER_NAME }}; exit 1; }
            for i in $(seq 1 12); do
              docker exec ${{ vars.DOCKER_CONTAINER_NAME }} wget -qO- http://localhost:${{ vars.APP_SERVER_PORT }}/actuator/health 2>/dev/null | grep -q '"status":"UP"' && echo "Application is ready" && break
              [ $i -eq 12 ] && { echo "Application health check timed out"; docker logs ${{ vars.DOCKER_CONTAINER_NAME }}; exit 1; }
              echo "Waiting for application... ($i/12)"; sleep 5
            done
        env:
          IMAGE_TAG: ${{ needs.build-and-push-docker-image.outputs.image-tag }}
