networks:
  iced-latte-network:
    name: iced-latte-network
    attachable: true

volumes:
  pg_data:
  nginx_data:
  backend_logs: {}

services:

#  iced-latte-frontend:
#    image: 'zufarexplainedit/iced-latte-frontend:latest'
#    container_name: iced-latte-frontend
##    build:
##      context: /Users/astriganova/Desktop/Projects/Iced-Latte-Frontend
##      dockerfile: Dockerfile.local
#    restart: 'always'
#    ports:
#      - '3000:3000'
#    networks:
#      - iced-latte-network

  iced-latte-backend:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: iced-latte-backend
    environment:
      APP_SERVER_PORT: 8083
      APP_JWT_SECRET: ${APP_JWT_SECRET:-local_jwt_secret_placeholder}
      APP_JWT_REFRESH_SECRET: ${APP_JWT_REFRESH_SECRET:-local_jwt_refresh_secret_placeholder}
      DATASOURCE_PORT: 5432
      DATASOURCE_NAME: testdb
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: postgres
      DATASOURCE_HOST: iced-latte-postgresdb
      # amazonq-ignore-next-line
      REDIS_HOST: ${REDIS_HOST:-iced-latte-redis}
      REDIS_PORT: ${REDIS_PORT:-6380}
      AWS_DEFAULT_PRODUCT_IMAGES_PATH: ./products
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:?AWS_ACCESS_KEY is required - set it in local.env}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:?AWS_SECRET_KEY is required - set it in local.env}
      AWS_REGION: eu-west-1
      AWS_PRODUCT_BUCKET: products
      AWS_USER_BUCKET: users
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID:?GOOGLE_AUTH_CLIENT_ID is required}
      GOOGLE_AUTH_CLIENT_SECRET: ${GOOGLE_AUTH_CLIENT_SECRET:?GOOGLE_AUTH_CLIENT_SECRET is required}
      GOOGLE_AUTH_REDIRECT_URI: ${GOOGLE_AUTH_REDIRECT_URI:?GOOGLE_AUTH_REDIRECT_URI is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
    ports:
      - '8083:8083'
      - '5005:5005' # port for remote debugging
    networks:
      - iced-latte-network
    depends_on:
      iced-latte-postgresdb:
        condition: service_healthy
      iced-latte-redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - backend_logs:/usr/app/logs
      - ./products:/usr/app/products
    restart: on-failure
    stop_grace_period: 30s

  iced-latte-postgresdb:
    image: 'postgres:14.18'
    container_name: iced-latte-postgresdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=testdb
    ports:
      - '5432:5432'
    networks:
      - iced-latte-network
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: on-failure

# nginx is currently handled at the infrastructure level (not via Docker Compose)
#  iced-latte-nginx:
#    image: nginx:alpine
#    container_name: iced-latte-nginx
#    volumes:
#      - ./nginx_data:/etc/nginx/conf.d:ro
#    ports:
#      - '80:80'
#    networks:
#      - iced-latte-network
#    depends_on:
#      - iced-latte-backend
#    restart: on-failure

  iced-latte-redis:
    image: redis/redis-stack:7.2.0-v13
    container_name: iced-latte-redis
    networks:
      - iced-latte-network
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6379", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: on-failure
