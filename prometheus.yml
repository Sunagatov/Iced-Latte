# Prometheus configuration for Iced-Latte backend monitoring.
# Scrapes Spring Actuator metrics endpoint every 15 seconds.
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-application'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['iced-latte-backend:8083']
