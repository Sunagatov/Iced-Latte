version: '3'

# Maintainer deployment tasks — contributors don't need these.
# Requires local untracked files: .env.prod and docker-compose.prod.yml
# See ops/Taskfile.yml for task definitions.

includes:
  ops:
    taskfile: ops/Taskfile.yml
    dir: .

tasks:
  build:
    desc: Build Docker image for ARM64
    cmds: [task ops:build]

  push:
    desc: Push Docker image to Docker Hub
    cmds: [task ops:push]

  sync-compose:
    desc: Copy docker-compose.prod.yml to remote server
    cmds: [task ops:sync-compose]

  deploy:
    desc: Deploy to production server
    cmds: [task ops:deploy]

  logs:
    desc: Show recent production logs
    cmds: [task ops:logs]

  smoke:
    desc: Run smoke test against production
    cmds: [task ops:smoke]

  build-and-push:
    desc: Build and push in one step
    cmds: [task ops:build-and-push]

  full-deploy:
    desc: Complete flow (build → push → sync-compose → deploy → smoke)
    cmds: [task ops:full-deploy]
